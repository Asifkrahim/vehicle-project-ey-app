<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="VehicleCare+ — Smart Vehicle Maintenance Tracker. Log services, track health, and get AI-powered advice.">
  <link rel="manifest" href="{% static 'manifest.json' %}">
  <link rel="apple-touch-icon" href="{% static 'icons/icon-192.svg' %}">
  <title>VehicleCare+ — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'vehiclecareapp/style.css' %}">
</head>
<body class="auth-page">

  <!-- Animated background orbs -->
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>
  <div class="auth-orb auth-orb-3"></div>

  <div class="auth-inner">
    <!-- Auth Card -->
    <div class="auth-card">
      <div class="brand-row">
        <div class="auth-logo" aria-hidden="true">
          <svg viewBox="0 0 48 48" width="52" height="52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 4L8 10v14c0 9.4 6.8 18.2 16 20 9.2-1.8 16-10.6 16-20V10L24 4z" fill="url(#shieldGold)" opacity="0.15"/>
            <path d="M24 4L8 10v14c0 9.4 6.8 18.2 16 20 9.2-1.8 16-10.6 16-20V10L24 4z" stroke="#ffd700" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M21 20l-2 8 5-4 5 4-2-8 3-3h-4l-2-5-2 5h-4l3 3z" fill="#ffd700" opacity="0.9"/>
            <defs><linearGradient id="shieldGold" x1="8" y1="4" x2="40" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#ffd700"/><stop offset="1" stop-color="#ffb300"/></linearGradient></defs>
          </svg>
        </div>
        <span class="brand">VehicleCare+</span>
      </div>
      <p class="subtitle">Your Smart Maintenance Tracker</p>

      {% if messages %}
        {% for message in messages %}
          <div class="msg-error" role="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST" data-loading>
        {% csrf_token %}

        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input
            type="email"
            name="email"
            id="loginEmail"
            required
            autocomplete="email"
            placeholder="you@example.com"
          >
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              name="password"
              id="loginPassword"
              required
              autocomplete="current-password"
              placeholder="••••••••"
            >
            <button type="button" class="toggle-pass" data-target="loginPassword" aria-label="Show password">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn" id="loginBtn">
          <span class="btn-spinner"></span>
          <span class="btn-text">Login</span>
        </button>
      </form>

      <a href="{% url 'signup' %}" class="btn btn-secondary mt-8">Create Account</a>
    </div>
  </div>

  <script src="{% static 'vehiclecareapp/app.js' %}"></script>
</body>
</html>
