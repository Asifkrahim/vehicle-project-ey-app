<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#090909">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <link rel="apple-touch-icon" href="{% static 'icons/icon-192.svg' %}">
    <title>VehicleCare+ - Login</title>
    <link rel="stylesheet" href="{% static 'vehiclecareapp/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="container">
        <div class="car-animation">
            <div class="car-container">
                <div class="car-body"></div>
                <div class="car-top"></div>
                <div class="wheel left"></div>
                <div class="wheel right"></div>
                <div class="headlight"></div>
            </div>
        </div>
        <div class="auth-card">
            <h1>VehicleCare+</h1>
            <p class="subtitle">Your Smart Vehicle Maintenance Tracker</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="error">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" name="email" id="loginEmail" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" name="password" id="loginPassword" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn">Login</button>
            </form>

            <a href="{% url 'signup' %}" class="btn btn-secondary">Create Account</a>
        </div>
    </div>
    <script src="{% static 'vehiclecareapp/app.js' %}"></script>
</body>
</html>
